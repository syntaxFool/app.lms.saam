events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  # Rate limiting — 30 req/s per IP
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

  # Docker DNS resolver — enables dynamic re-resolution of upstream hostnames
  # Prevents 502 errors when backend containers are rebuilt with new IPs
  resolver 127.0.0.11 ipv6=off valid=10s;

  # ── Redirect hp-landing.aika-shuz.fyi → hp-lms.aika-shuz.fyi/landingpage/leadform/ ──
  server {
    listen 80;
    server_name hp-landing.aika-shuz.fyi;

    location / {
      return 301 https://hp-lms.aika-shuz.fyi/landingpage/leadform/;
    }
  }

  server {
    listen 80;
    server_name hp-lms.aika-shuz.fyi;

    # Serve Vue SPA
    location / {
      proxy_pass         http://lms_hp_web:80;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_cache_bypass $http_upgrade;
    }

    # Serve landing page form and static assets
    location = /landingpage/leadform {
        return 301 /landingpage/leadform/;
    }
    location /landingpage/leadform/ {
        alias /usr/share/nginx/html/landingpage/;
        index index.html;
    }

    # Proxy API calls to Express backend
    location /api/ {
      limit_req zone=api_limit burst=60 nodelay;

      resolver 127.0.0.11 ipv6=off valid=10s;
      set $backend_upstream lms_hp_api;
      proxy_pass         http://$backend_upstream:8080;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_read_timeout 60s;
    }
  }
}
