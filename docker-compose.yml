services:
  postgres:
    image: postgres:16-alpine
    container_name: lms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - lms_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_api
    restart: unless-stopped
    environment:
      DB_HOST:          postgres
      DB_PORT:          5432
      DB_NAME:          ${DB_NAME}
      DB_USER:          ${DB_USER}
      DB_PASSWORD:      ${DB_PASSWORD}
      JWT_SECRET:       ${JWT_SECRET}
      ALLOWED_ORIGINS:  ${ALLOWED_ORIGINS}
      PORT:             8080
    depends_on:
      - postgres
    networks:
      - lms_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lms_web
    restart: unless-stopped
    networks:
      - lms_net

  nginx:
    image: nginx:alpine
    container_name: lms_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lms_net
      - coolify
    labels:
      - "traefik.enable=true"
      # ── Primary: lms.aika-shuz.fyi ──
      - "traefik.http.routers.lms.rule=Host(`lms.aika-shuz.fyi`)"
      - "traefik.http.routers.lms.entrypoints=https"
      - "traefik.http.routers.lms.tls=true"
      - "traefik.http.routers.lms.tls.certresolver=letsencrypt"
      - "traefik.http.services.lms.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"
      # ── Redirect: sa0lms.myaddr.tools → lms.aika-shuz.fyi ──
      - "traefik.http.middlewares.lms-old-redirect.redirectregex.regex=^https?://sa0lms\\.myaddr\\.tools(.*)"
      - "traefik.http.middlewares.lms-old-redirect.redirectregex.replacement=https://lms.aika-shuz.fyi$${1}"
      - "traefik.http.middlewares.lms-old-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.lms-old-http.rule=Host(`sa0lms.myaddr.tools`)"
      - "traefik.http.routers.lms-old-http.entrypoints=http"
      - "traefik.http.routers.lms-old-http.middlewares=lms-old-redirect"
      - "traefik.http.routers.lms-old-https.rule=Host(`sa0lms.myaddr.tools`)"
      - "traefik.http.routers.lms-old-https.entrypoints=https"
      - "traefik.http.routers.lms-old-https.tls=true"
      - "traefik.http.routers.lms-old-https.middlewares=lms-old-redirect"

volumes:
  postgres_data:

networks:
  lms_net:
    driver: bridge
  coolify:
    external: true
